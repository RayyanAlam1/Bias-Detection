name: CI — Lint & Test

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ── Job 1: Lint ──────────────────────────────────────────────────────────────
  lint:
    name: Lint (flake8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8
        run: |
          flake8 webapp/app.py predict.py train_classifier.py \
            --max-line-length=120 \
            --ignore=E501,W503,E221,E241,E226,E402,F401,W391

  # ── Job 2: Unit tests ────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies (CPU-only torch for CI)
        run: |
          pip install --upgrade pip
          pip install flask pytest
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install transformers>=4.40.0 numpy pandas scikit-learn huggingface-hub safetensors requests beautifulsoup4

      - name: Run tests
        run: pytest tests/ -v --tb=short

  # ── Job 3: Deploy to Hugging Face Spaces (on push to main only) ─────────────
  deploy:
    name: Deploy to HF Spaces
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Deploy to Hugging Face Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          pip install "huggingface_hub>=0.24.0"
          python - <<'EOF'
          import os
          import sys
          from huggingface_hub import HfApi

          token = os.getenv("HF_TOKEN")
          if not token:
              print("ERROR: Missing Hugging Face token. Set GitHub secret HF_TOKEN.")
              sys.exit(1)

          api = HfApi(token=token)

          # Validate token early so failures are explicit in CI logs.
          try:
              who = api.whoami(token=token)
              print(f"Authenticated to Hugging Face as: {who.get('name', 'unknown')}")
          except Exception as exc:
              print(f"ERROR: Hugging Face authentication failed: {exc}")
              print("Check that the token has Write permissions for Spaces.")
              sys.exit(1)

          # Create the Space if it doesn't exist yet
          api.create_repo(
              repo_id="RayyanAlam123/KhabarCheck",
              repo_type="space",
              space_sdk="gradio",
              exist_ok=True,
              private=False,
          )
          # Upload only the files the Space needs
          api.upload_folder(
              folder_path=".",
              repo_id="RayyanAlam123/KhabarCheck",
              repo_type="space",
              allow_patterns=[
                "hf_app.py",
                "README.md",
                "requirements.txt",
              ],
              commit_message="ci: deploy from GitHub Actions",
          )
          print("Deploy complete!")
          EOF
