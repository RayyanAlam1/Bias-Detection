name: CI — Lint & Test

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ── Job 1: Lint ──────────────────────────────────────────────────────────────
  lint:
    name: Lint (flake8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8
        run: |
          flake8 webapp/app.py predict.py train_classifier.py \
            --max-line-length=120 \
            --ignore=E501,W503

  # ── Job 2: Unit tests ────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies (CPU-only torch for CI)
        run: |
          pip install --upgrade pip
          pip install flask pytest
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install transformers>=4.40.0 numpy pandas scikit-learn huggingface-hub safetensors

      - name: Run tests
        run: pytest tests/ -v --tb=short

  # ── Job 3: Deploy to Hugging Face Spaces (on push to main only) ─────────────
  deploy:
    name: Deploy to HF Spaces
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config user.email "ci@github-actions.com"
          git config user.name "GitHub Actions"
          git remote add hf https://RayyanAlam123:$HF_TOKEN@huggingface.co/spaces/RayyanAlam123/Bias-Detection
          git push hf main --force
